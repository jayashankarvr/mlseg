name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      # mlnorm is a PyO3 (Rust) package and is not on PyPI yet, so it is built
      # from its GitHub source here. The wheel lives in mlnorm's bindings/ dir
      # (maturin). Once mlnorm is published this whole block becomes a plain
      # `pip install mlnorm`.
      - uses: dtolnay/rust-toolchain@stable
      - name: Install mlnorm from source
        run: pip install "git+https://github.com/jayashankarvr/mlnorm.git#subdirectory=bindings"
      - name: Install mlseg
        run: pip install -e ".[dev]"
      - name: Run tests
        run: pytest -q

  publish:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build
        run: |
          pip install build twine
          python -m build
      - name: Upload to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*
